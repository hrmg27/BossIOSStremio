# XcodeGen spec — regenerates StremioIOS.xcodeproj deterministically on any Mac
# (or CI runner). Run `xcodegen generate` before opening/building. This avoids a
# hand-written .pbxproj and keeps the project reproducible from Windows-authored
# source.
name: StremioIOS
options:
  bundleIdPrefix: com.hrmg
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true

settings:
  base:
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"

targets:
  StremioIOS:
    type: application
    platform: iOS
    sources:
      - path: StremioIOS
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.hrmg.stremioios
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: Stremio
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIBackgroundModes: audio
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        TARGETED_DEVICE_FAMILY: "1,2"
        CODE_SIGN_STYLE: Automatic
