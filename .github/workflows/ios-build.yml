name: Build iOS (unsigned IPA)

# Builds an UNSIGNED .ipa on a cloud macOS runner. Download the artifact and let
# AltServer (Windows) resign + install it with your free Apple ID. This is the
# path that lets the whole project be authored on Windows.
on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build (unsigned)
        run: |
          xcodebuild \
            -project StremioIOS.xcodeproj \
            -scheme StremioIOS \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            clean build

      - name: Package .ipa
        run: |
          set -e
          APP_PATH="build/Build/Products/Release-iphoneos/StremioIOS.app"
          plutil -p "$APP_PATH/Info.plist" | grep -E "CFBundleIdentifier|CFBundleExecutable|CFBundleVersion" || true
          test -f "$APP_PATH/StremioIOS" && echo "Executable present: OK" || (echo "MISSING EXECUTABLE" && exit 1)
          rm -rf Payload StremioIOS-unsigned.ipa
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          zip -r -X StremioIOS-unsigned.ipa Payload -x "*.DS_Store"

      - uses: actions/upload-artifact@v4
        with:
          name: StremioIOS-unsigned-ipa
          path: StremioIOS-unsigned.ipa
